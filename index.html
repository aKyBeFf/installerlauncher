    function setLang(lang, persist){
        const t = I18N[lang] || I18N.ru;
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t[el.dataset.i18n] || '');
        document.querySelectorAll('.langs button').forEach(b => b.classList.toggle('on', b.dataset.lang === lang));
        if (persist) { try { localStorage.setItem('aqb-lang', lang); } catch(e){} }
    }

    document.querySelectorAll('.langs button').forEach(b =>
        b.addEventListener('click', () => setLang(b.dataset.lang, true)));

    // Гео-определение: Украина/Россия/Беларусь/Казахстан -> русский, остальные страны -> английский.
    // Украинский остаётся ручным выбором. Сохранённый выбор пользователя всегда важнее.
    const RU_COUNTRIES = ['UA','RU','BY','KZ'];
    function geoDefault(){
        return fetch('https://ipapi.co/json/')
            .then(r => r.ok ? r.json() : null)
            .then(d => {
                const cc = (d && (d.country_code || d.country) || '').toUpperCase();
                return RU_COUNTRIES.includes(cc) ? 'ru' : (cc ? 'en' : null);
            })
            .catch(() => null);
    }

    let saved = null;
    try { saved = localStorage.getItem('aqb-lang'); } catch(e){}
    if (saved && ['ru','uk','en'].includes(saved)) {
        setLang(saved, false);
    } else {
        setLang('ru', false);                          // временно, пока не пришёл гео-ответ
        geoDefault().then(l => { if (l && !localStorage.getItem('aqb-lang')) setLang(l, false); });
    }

    // версия из последнего релиза
    fetch('https://api.github.com/repos/aKyBeFf/launcher/releases/latest')
        .then(r => r.ok ? r.json() : null)
        .then(d => { if(d && d.tag_name){ const v=document.getElementById('ver');
            v.textContent = d.tag_name.startsWith('v')?d.tag_name:('v'+d.tag_name); v.style.display='inline-block'; } })
        .catch(()=>{});
